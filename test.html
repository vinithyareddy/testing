   <div class="quick-access-header">
    Quick Access
    <span (click)="toggleQuickAccess()" class="bgt-collapse-state">
      <img *ngIf="!quickAccessCollapsed" src="assets/images/budget_glance/arrow_up.png" />
      <img *ngIf="quickAccessCollapsed" src="assets/images/budget_glance/arrow_down.png" />
    </span>
  </div>
  
  <div *ngIf="!quickAccessCollapsed">
    <div class="section-container" *ngFor="let section of sections">
      <div class="section-header" (click)="toggleSection(section)">
        {{ section.title }}
        <span class="bgt-collapse-state">
          <img *ngIf="!section.expanded" src="assets/images/budget_glance/arrow_down.png" />
          <img *ngIf="section.expanded" src="assets/images/budget_glance/arrow_up.png" />
        </span>
      </div>
      <div class="section-body" *ngIf="section.expanded">
        <ul>
          <li *ngFor="let item of section.items">
            <span class="dummy-link">
              <i [ngClass]="item.icon"></i> {{ item.label }}
            </span>
          </li>
        </ul>
      </div>
    </div>
  </div>
  
<!-- Add this inside the section-body block -->
<div 
  *ngIf="section.title === 'Key/Exception Reports' && section.originalTitle === 'Related Policy, Directives or Procedures'" 
  class="inline-show-toggle" 
  (click)="expandFourthSection()"
>
  <span class="show-more-text">Show More</span>
  <i class="fas fa-chevron-down"></i>
</div>

<div 
  *ngFor="let section of sections" 
  [attr.id]="section.title === 'P-Card Quick Reference Guides and PCard Reports' ? 'section-pcard' : null"
  class="section-container"
>
